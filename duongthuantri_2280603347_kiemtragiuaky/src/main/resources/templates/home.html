<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">

<head>
    <title>Trang chủ</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="main-container">

            <div th:if="${success}" class="alert alert-success">✅ <span th:text="${success}"></span></div>
            <div th:if="${error}" class="alert alert-danger">⚠️ <span th:text="${error}"></span></div>

            <div class="page-header">
                <h1 class="page-title">Khám phá Học phần</h1>
                <p class="page-subtitle" th:if="${keyword == null or keyword.isEmpty()}">
                    Tất cả học phần đang mở đăng ký</p>
                <p class="page-subtitle" th:if="${keyword != null and !keyword.isEmpty()}">
                    Kết quả tìm kiếm: <strong th:text="'&quot;' + ${keyword} + '&quot;'">"..."</strong>
                    — tìm thấy <span th:text="${coursePage.totalElements}">0</span> học phần
                </p>
            </div>

            <div th:if="${coursePage.content.size() > 0}" class="courses-grid">
                <div class="course-card" th:each="course : ${coursePage.content}">

                    <div class="img-wrapper">
                        <img th:if="${course.image != null and !course.image.isEmpty()}" th:src="${course.image}"
                            th:alt="${course.name}" class="course-card-img"
                            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'" />
                        <div class="course-card-img-placeholder"
                            th:style="${course.image != null and !course.image.isEmpty()} ? 'display:none' : ''">🎓
                        </div>
                    </div>

                    <div class="course-card-body">
                        <div class="course-card-name" th:text="${course.name}">Tên học phần</div>
                        <div class="course-card-meta">
                            <span class="meta-item">
                                <i class="icon">⭐</i>
                                <span th:text="${course.credits} + ' tín chỉ'">3 tín chỉ</span>
                            </span>
                            <span class="meta-item">
                                <i class="icon">👨‍🏫</i>
                                <span th:text="${course.lecturer}">Giảng viên</span>
                            </span>
                            <span class="meta-item" th:if="${course.category != null}">
                                <i class="icon">📂</i>
                                <span class="badge badge-primary" th:text="${course.category.name}">Danh mục</span>
                            </span>
                        </div>

                        <div sec:authorize="hasRole('STUDENT')">
                            <span th:if="${enrolledIds != null and enrolledIds.contains(course.id)}"
                                class="badge badge-success" style="padding: 0.45rem 0.8rem;">✅ Đã đăng ký</span>
                            <form th:unless="${enrolledIds != null and enrolledIds.contains(course.id)}"
                                th:action="@{/enroll/{id}(id=${course.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-success btn-sm btn-full">📝 Đăng ký</button>
                            </form>
                        </div>

                        <div sec:authorize="isAnonymous()">
                            <a th:href="@{/login}" class="btn btn-outline btn-sm btn-full">Đăng nhập để đăng ký</a>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${coursePage.content.size() == 0}" class="empty-state">
                <div class="icon">🔍</div>
                <h3>Không tìm thấy học phần</h3>
                <p>Thử tìm kiếm với từ khóa khác</p>
            </div>

            <div class="pagination" th:if="${totalPages > 1}">
                <a th:href="@{/home(page=${currentPage - 1}, keyword=${keyword})}"
                    th:classappend="${currentPage == 0} ? 'disabled'" class="page-link">‹</a>
                <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:href="@{/home(page=${i}, keyword=${keyword})}" th:text="${i + 1}"
                    th:classappend="${i == currentPage} ? 'active'" class="page-link">1</a>
                <a th:href="@{/home(page=${currentPage + 1}, keyword=${keyword})}"
                    th:classappend="${currentPage == totalPages - 1} ? 'disabled'" class="page-link">›</a>
            </div>

        </div>
    </div>
</body>

</html>
