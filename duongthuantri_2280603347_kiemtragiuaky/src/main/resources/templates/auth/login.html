<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/base}">

<head>
    <title>Đăng nhập</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="auth-container">
            <div class="form-card">
                <div class="auth-logo">🎓</div>
                <h1 class="auth-title">Chào mừng trở lại</h1>
                <p class="auth-subtitle">Đăng nhập để tiếp tục vào CourseHub</p>

                <div th:if="${param.logout}" class="alert alert-info">✅ Bạn đã đăng xuất thành công.</div>
                <div th:if="${param.error}" class="alert alert-danger">⚠️ Sai tên đăng nhập hoặc mật khẩu.</div>
                <div th:if="${success}" class="alert alert-success">✅ <span th:text="${success}"></span></div>

                <form th:action="@{/login}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="form-group">
                        <label class="form-label" for="username">Tên đăng nhập</label>
                        <input id="username" type="text" name="username" class="form-control"
                            placeholder="Nhập tên đăng nhập" required autocomplete="username" />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">Mật khẩu</label>
                        <input id="password" type="password" name="password" class="form-control"
                            placeholder="Nhập mật khẩu" required autocomplete="current-password" />
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Đăng nhập →</button>
                </form>

                <div class="divider">HOẶC</div>

                <a th:href="@{/oauth2/authorization/google}" class="btn-google">
                    <svg width="20" height="20" viewBox="0 0 48 48">
                        <path fill="#EA4335"
                            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                        <path fill="#4285F4"
                            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                        <path fill="#FBBC05"
                            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                        <path fill="#34A853"
                            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                    </svg>
                    Đăng nhập bằng Google
                </a>

                <p style="text-align:center; margin-top:1.5rem; font-size:0.88rem; color:var(--text-muted)">
                    Chưa có tài khoản?
                    <a th:href="@{/register}"
                        style="color:var(--primary-light); font-weight:600; text-decoration:none;">
                        Đăng ký ngay
                    </a>
                </p>
            </div>
        </div>
    </div>
</body>

</html>
