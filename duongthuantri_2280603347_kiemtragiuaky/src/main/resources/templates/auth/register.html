<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/base}">

<head>
    <title>Đăng ký tài khoản</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="auth-container">
            <div class="form-card">
                <div class="auth-logo">📝</div>
                <h1 class="auth-title">Tạo tài khoản</h1>
                <p class="auth-subtitle">Tham gia CourseHub và bắt đầu học ngay</p>

                <div th:if="${error}" class="alert alert-danger">⚠️ <span th:text="${error}"></span></div>

                <form th:action="@{/register}" th:object="${student}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="form-group">
                        <label class="form-label" for="username">Tên đăng nhập</label>
                        <input id="username" type="text" th:field="*{username}" class="form-control"
                            placeholder="Chọn tên đăng nhập" required />
                        <span class="form-error" th:if="${#fields.hasErrors('username')}"
                            th:errors="*{username}"></span>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Mật khẩu</label>
                        <input id="password" type="password" th:field="*{password}" class="form-control"
                            placeholder="Tạo mật khẩu mạnh" required />
                        <span class="form-error" th:if="${#fields.hasErrors('password')}"
                            th:errors="*{password}"></span>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input id="email" type="email" th:field="*{email}" class="form-control"
                            placeholder="your@email.com" required />
                        <span class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Tạo tài khoản →</button>
                </form>

                <p style="text-align:center; margin-top:1.5rem; font-size:0.88rem; color:var(--text-muted)">
                    Đã có tài khoản?
                    <a th:href="@{/login}" style="color:var(--primary-light); font-weight:600; text-decoration:none;">
                        Đăng nhập tại đây
                    </a>
                </p>
            </div>
        </div>
    </div>
</body>

</html>
