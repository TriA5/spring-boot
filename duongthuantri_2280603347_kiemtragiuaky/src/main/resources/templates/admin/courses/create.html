<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/base}">

<head>
    <title>Thêm Học phần</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="main-container">
            <div style="max-width:600px; margin:0 auto">

                <div class="page-header">
                    <h1 class="page-title">+ Thêm Học phần</h1>
                    <p class="page-subtitle">Thêm học phần mới vào danh mục</p>
                </div>

                <div class="form-card" style="max-width:none">
                    <form th:action="@{/admin/courses/create}" th:object="${course}" method="post"
                        enctype="multipart/form-data">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="form-group">
                            <label class="form-label">Tên học phần *</label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="vd: Lập trình Java"
                                required />
                            <span class="form-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                        </div>

                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem">
                            <div class="form-group">
                                <label class="form-label">Số tín chỉ *</label>
                                <input type="number" th:field="*{credits}" class="form-control" min="1" max="10"
                                    placeholder="3" required />
                                <span class="form-error" th:if="${#fields.hasErrors('credits')}"
                                    th:errors="*{credits}"></span>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Danh mục</label>
                                <select th:field="*{category}" class="form-control">
                                    <option value="">-- Chọn danh mục --</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">
                                        Danh mục</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Giảng viên *</label>
                            <input type="text" th:field="*{lecturer}" class="form-control"
                                placeholder="TS. Nguyễn Văn A" required />
                            <span class="form-error" th:if="${#fields.hasErrors('lecturer')}"
                                th:errors="*{lecturer}"></span>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Hình ảnh minh họa</label>
                            <input type="file" name="imageFile" class="form-control" accept="image/*" />
                            <p class="form-text">PNG, JPG tối đa 10MB. Để trống nếu không có ảnh.</p>
                        </div>

                        <div style="display:flex; gap:1rem; margin-top:0.5rem">
                            <button type="submit" class="btn btn-primary">Tạo học phần</button>
                            <a th:href="@{/admin/courses}" class="btn btn-secondary">Hủy</a>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
</body>

</html>
