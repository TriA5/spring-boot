<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/base}">

<head>
    <title>Quản lý Học phần</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="main-container">

            <div th:if="${success}" class="alert alert-success">✅ <span th:text="${success}"></span></div>
            <div th:if="${error}" class="alert alert-danger">⚠️ <span th:text="${error}"></span></div>

            <div class="section-header">
                <div class="page-header" style="margin-bottom:0">
                    <h1 class="page-title">⚙️ Quản lý Học phần</h1>
                    <p class="page-subtitle">Trang quản trị</p>
                </div>
                <a th:href="@{/admin/courses/create}" class="btn btn-primary">+ Thêm học phần</a>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Ảnh</th>
                            <th>Tên học phần</th>
                            <th>Tín chỉ</th>
                            <th>Giảng viên</th>
                            <th>Danh mục</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="course, stat : ${courses}">
                            <td th:text="${stat.index + 1}">1</td>
                            <td>
                                <img th:if="${course.image != null and !course.image.isEmpty()}"
                                    th:src="${course.image}" th:alt="${course.name}" class="table-img" />
                                <span th:unless="${course.image != null and !course.image.isEmpty()}">🎓</span>
                            </td>
                            <td style="font-weight:600" th:text="${course.name}">Tên</td>
                            <td><span class="badge badge-primary" th:text="${course.credits} + ' TC'">3 TC</span></td>
                            <td th:text="${course.lecturer}">GV</td>
                            <td>
                                <span th:if="${course.category != null}" class="badge badge-success"
                                    th:text="${course.category.name}">-</span>
                                <span th:unless="${course.category != null}" style="color:var(--text-muted)">—</span>
                            </td>
                            <td style="display:flex; gap:0.5rem; flex-wrap:wrap">
                                <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}"
                                    class="btn btn-secondary btn-sm">✏️ Sửa</a>
                                <form th:action="@{/admin/courses/delete/{id}(id=${course.id})}" method="post"
                                    onsubmit="return confirm('Xóa học phần này?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-danger btn-sm">🗑️ Xóa</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${courses.isEmpty()}">
                            <td colspan="7" style="text-align:center; color:var(--text-muted)">Chưa có học phần nào.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</body>

</html>
