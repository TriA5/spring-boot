<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title layout:title-pattern="$CONTENT_TITLE - CourseHub">CourseHub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>

    <nav class="navbar">
        <a class="navbar-brand" th:href="@{/home}">🎓 CourseHub</a>

        <form class="navbar-search" th:action="@{/home}" method="get">
            <svg width="16" height="16" fill="none" stroke="#94a3b8" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
            </svg>
            <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm kiếm học phần..." />
            <button type="submit" class="btn-search">Tìm</button>
        </form>

        <ul class="navbar-nav">
            <li><a class="nav-link" th:href="@{/home}">🏠 Trang chủ</a></li>

            <li sec:authorize="hasRole('STUDENT')">
                <a class="nav-link" th:href="@{/my-courses}">📚 Học phần của tôi</a>
            </li>

            <li sec:authorize="hasRole('ADMIN')">
                <a class="nav-link" th:href="@{/admin/courses}">⚙️ Quản lý</a>
            </li>

            <li sec:authorize="isAnonymous()">
                <a class="nav-link" th:href="@{/login}">Đăng nhập</a>
            </li>
            <li sec:authorize="isAnonymous()">
                <a class="btn btn-primary btn-sm" th:href="@{/register}">Đăng ký</a>
            </li>

            <li sec:authorize="isAuthenticated()">
                <span class="nav-link" style="color: var(--text)">
                    👤 <span sec:authentication="name"></span>
                </span>
            </li>
            <li sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="nav-link"
                        style="background:none;border:none;cursor:pointer;color:var(--text-muted)">
                        🚪 Đăng xuất
                    </button>
                </form>
            </li>
        </ul>
    </nav>

    <main layout:fragment="content"></main>

    <script>
        document.querySelectorAll('.alert').forEach(el => {
            setTimeout(() => { el.style.transition = 'opacity 0.5s'; el.style.opacity = '0'; setTimeout(() => el.remove(), 500); }, 4000);
        });
    </script>
</body>

</html>
