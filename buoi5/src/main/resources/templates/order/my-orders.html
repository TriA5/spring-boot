<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main}">

<head>
    <title>Đơn hàng của tôi</title>
</head>

<body>
    <div layout:fragment="content">
        <h2 class="page-title">📋 Đơn hàng của tôi</h2>

        <div th:if="${orders.isEmpty()}" class="empty-state">
            <p>Bạn chưa có đơn hàng nào.</p>
            <a th:href="@{/products}" class="btn btn-primary">🛍️ Mua sắm ngay</a>
        </div>

        <div th:if="${!orders.isEmpty()}">
            <div th:each="order : ${orders}" class="order-card">
                <div class="order-header">
                    <div>
                        <strong>Đơn hàng #<span th:text="${order.id}"></span></strong>
                        <span th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"
                            style="margin-left:1rem; color:#888;"></span>
                    </div>
                    <span class="badge" th:classappend="${order.status.name() == 'PENDING' ? 'badge-warning' :
                                       order.status.name() == 'DELIVERED' ? 'badge-success' :
                                       order.status.name() == 'CANCELLED' ? 'badge-danger' : 'badge-info'}"
                        th:text="${order.status}">
                    </span>
                </div>
                <div class="order-body">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Sản phẩm</th>
                                <th>Số lượng</th>
                                <th>Đơn giá</th>
                                <th>Thành tiền</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${order.items}">
                                <td th:text="${item.product.name}"></td>
                                <td th:text="${item.quantity}"></td>
                                <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                                <td
                                    th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT') + ' ₫'}">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div class="order-footer">
                        <p><strong>Địa chỉ:</strong> <span th:text="${order.shippingAddress}"></span></p>
                        <p class="order-total"><strong>Tổng: <span
                                    th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span></strong>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
