<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security" layout:decorate="~{layout/main}">

<head>
    <title>Sản phẩm</title>
</head>

<body>
    <div layout:fragment="content">

        <div class="page-header">
            <h2>🛍️ Danh Sách Sản Phẩm
                <small th:if="${totalItems != null}" class="item-count">(<span th:text="${totalItems}"></span> sản
                    phẩm)</small>
            </h2>
            <sec:authorize access="hasAuthority('ROLE_ADMIN')">
                <a th:href="@{/products/create}" class="btn btn-primary">+ Thêm sản phẩm</a>
            </sec:authorize>
        </div>

        <!-- ===== BỘ LỌC (Câu 1 + 3 + 4) ===== -->
        <form th:action="@{/products}" method="get" class="filter-bar">
            <!-- Câu 1: Tìm kiếm theo tên -->
            <div class="filter-group">
                <label>🔍 Tìm kiếm</label>
                <input type="text" name="keyword" th:value="${keyword}" class="form-control"
                    placeholder="Tên sản phẩm..." />
            </div>

            <!-- Câu 4: Lọc theo category -->
            <div class="filter-group">
                <label>📂 Danh mục</label>
                <select name="categoryId" class="form-control">
                    <option value="">-- Tất cả --</option>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                        th:selected="${cat.id == categoryId}"></option>
                </select>
            </div>

            <!-- Câu 3: Sắp xếp theo giá -->
            <div class="filter-group">
                <label>↕️ Sắp xếp</label>
                <select name="sortField" class="form-control">
                    <option value="id" th:selected="${sortField == 'id'}">Mặc định</option>
                    <option value="price" th:selected="${sortField == 'price'}">Theo giá</option>
                    <option value="name" th:selected="${sortField == 'name'}">Theo tên</option>
                </select>
            </div>
            <div class="filter-group">
                <label>🔢 Chiều</label>
                <select name="sortDir" class="form-control">
                    <option value="asc" th:selected="${sortDir == 'asc'}">Tăng dần ↑</option>
                    <option value="desc" th:selected="${sortDir == 'desc'}">Giảm dần ↓</option>
                </select>
            </div>

            <input type="hidden" name="page" value="0" />
            <input type="hidden" name="size" th:value="${pageSize}" />

            <div class="filter-actions">
                <button type="submit" class="btn btn-primary">Áp dụng</button>
                <a th:href="@{/products}" class="btn btn-secondary">Đặt lại</a>
            </div>
        </form>

        <!-- Thông báo đang lọc -->
        <div th:if="${(keyword != null and !keyword.isEmpty()) or (categoryId != null and categoryId > 0)}"
            class="search-info">
            <span th:if="${keyword != null and !keyword.isEmpty()}">
                Từ khóa: <strong th:text="${keyword}"></strong>
            </span>
            <span th:if="${categoryId != null and categoryId > 0}">
                &nbsp;| Danh mục đã chọn
            </span>
            <span th:if="${sortField == 'price'}">
                &nbsp;| Giá: <strong th:text="${sortDir == 'asc' ? 'Tăng dần ↑' : 'Giảm dần ↓'}"></strong>
            </span>
        </div>

        <!-- Empty state -->
        <div th:if="${products.empty}" class="empty-state">
            <p>😕 Không tìm thấy sản phẩm phù hợp.</p>
            <a th:href="@{/products}" class="btn btn-secondary">Xem tất cả</a>
        </div>

        <!-- ===== BẢNG SẢN PHẨM (Câu 2: phân trang 5/trang) ===== -->
        <div class="table-wrapper" th:unless="${products.empty}">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Ảnh</th>
                        <th>
                            <a th:href="@{/products(keyword=${keyword},categoryId=${categoryId},page=${currentPage},size=${pageSize},sortField='name',sortDir=${sortField=='name'?reverseSortDir:'asc'})}"
                                class="sort-link">
                                Tên sản phẩm
                                <span th:if="${sortField == 'name'}" th:text="${sortDir == 'asc' ? '↑' : '↓'}"></span>
                            </a>
                        </th>
                        <th>Danh mục</th>
                        <th>
                            <a th:href="@{/products(keyword=${keyword},categoryId=${categoryId},page=${currentPage},size=${pageSize},sortField='price',sortDir=${sortField=='price'?reverseSortDir:'asc'})}"
                                class="sort-link">
                                Giá
                                <span th:if="${sortField == 'price'}" th:text="${sortDir == 'asc' ? '↑' : '↓'}"></span>
                            </a>
                        </th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product, stat : ${products}">
                        <td th:text="${currentPage * pageSize + stat.count}"></td>
                        <td>
                            <img th:if="${product.image != null and !#strings.isEmpty(product.image)}"
                                th:src="${product.image}" th:alt="${product.name}" class="product-img" />
                            <span th:unless="${product.image != null and !#strings.isEmpty(product.image)}"
                                class="no-image">📦</span>
                        </td>
                        <td>
                            <strong th:text="${product.name}"></strong>
                            <div th:if="${product.description != null and !#strings.isEmpty(product.description)}"
                                style="font-size:12px;color:#6b7280;"
                                th:text="${#strings.abbreviate(product.description,60)}"></div>
                        </td>
                        <td th:text="${product.category != null ? product.category.name : 'N/A'}"></td>
                        <td>
                            <strong style="color:var(--primary);"
                                th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT') + ' ₫'}"></strong>
                        </td>
                        <td class="action-buttons">
                            <!-- Câu 5: Thêm vào giỏ hàng (có quantity) -->
                            <div sec:authorize="isAuthenticated() and !hasAuthority('ROLE_ADMIN')"
                                style="display:flex;align-items:center;gap:6px;">
                                <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post"
                                    style="display:flex;align-items:center;gap:4px;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="number" name="quantity" value="1" min="1" max="99" class="qty-input"
                                        title="Số lượng" />
                                    <button type="submit" class="btn btn-primary btn-sm">🛒 Thêm</button>
                                </form>
                            </div>
                            <sec:authorize access="hasAuthority('ROLE_ADMIN')">
                                <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-edit btn-sm">✏️
                                    Sửa</a>
                                <a th:href="@{/products/delete/{id}(id=${product.id})}" class="btn btn-danger btn-sm"
                                    onclick="return confirm('Xóa sản phẩm này?')">🗑️ Xóa</a>
                            </sec:authorize>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- ===== PHÂN TRANG (Câu 2: Next/Previous) ===== -->
        <div th:if="${totalPages > 1}" class="pagination">
            <!-- Previous -->
            <a th:href="@{/products(keyword=${keyword},categoryId=${categoryId},page=${currentPage - 1},size=${pageSize},sortField=${sortField},sortDir=${sortDir})}"
                th:classappend="${currentPage == 0 ? ' disabled' : ''}" class="page-btn">← Trước</a>

            <!-- Số trang -->
            <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:href="@{/products(keyword=${keyword},categoryId=${categoryId},page=${i},size=${pageSize},sortField=${sortField},sortDir=${sortDir})}"
                th:text="${i + 1}" th:classappend="${i == currentPage ? ' active' : ''}" class="page-btn"></a>

            <!-- Next -->
            <a th:href="@{/products(keyword=${keyword},categoryId=${categoryId},page=${currentPage + 1},size=${pageSize},sortField=${sortField},sortDir=${sortDir})}"
                th:classappend="${currentPage == totalPages - 1 ? ' disabled' : ''}" class="page-btn">Sau →</a>
        </div>

        <!-- Thông tin trang -->
        <div th:if="${!products.empty}" class="page-info">
            Trang <strong th:text="${currentPage + 1}"></strong> / <span th:text="${totalPages}"></span>
            &nbsp;|&nbsp; Tổng <span th:text="${totalItems}"></span> sản phẩm
        </div>
    </div>
</body>

</html>
