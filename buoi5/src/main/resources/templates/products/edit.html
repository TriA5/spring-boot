<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main}">

<head>
    <title>Edit Product</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="form-card">
            <h2>Chỉnh Sửa Sản Phẩm</h2>
            <form th:action="@{/products/edit/{id}(id=${product.id})}" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="name">Tên sản phẩm</label>
                    <input id="name" type="text" name="name" class="form-control" th:value="${product.name}" required />
                </div>
                <div class="form-group">
                    <label for="price">Giá</label>
                    <input id="price" type="number" name="price" class="form-control" th:value="${product.price}"
                        min="0" step="0.01" required />
                </div>
                <div class="form-group">
                    <label for="categoryId">Danh mục</label>
                    <select id="categoryId" name="categoryId" class="form-control" required>
                        <option value="">-- Chọn danh mục --</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                            th:selected="${product.category != null and product.category.id == cat.id}">Category
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ảnh hiện tại</label>
                    <div th:if="${product.image != null and !#strings.isEmpty(product.image)}">
                        <img th:src="${product.image}" alt="Current Image" class="product-img-preview" />
                    </div>
                </div>
                <div class="form-group">
                    <label for="imageFile">Đổi ảnh mới (để trống nếu không đổi)</label>
                    <input id="imageFile" type="file" name="imageFile" class="form-control" accept="image/*" />
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Cập Nhật</button>
                    <a th:href="@{/products}" class="btn btn-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
