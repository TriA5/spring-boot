<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main}">

<head>
    <title>Giỏ hàng</title>
</head>

<body>
    <div layout:fragment="content">
        <h2 class="page-title">🛒 Giỏ hàng của bạn</h2>

        <div th:if="${cart.items.isEmpty()}" class="empty-state">
            <p>🛍️ Giỏ hàng trống!</p>
            <a th:href="@{/products}" class="btn btn-primary">Mua sắm ngay</a>
        </div>

        <div th:if="${!cart.items.isEmpty()}">
            <div class="cart-table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th>Đơn giá</th>
                            <th>Số lượng</th>
                            <th>Thành tiền</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${cart.items}">
                            <td>
                                <div class="cart-product">
                                    <img th:src="${item.product.image != null ? item.product.image : '/images/no-image.png'}"
                                        th:alt="${item.product.name}" class="cart-img" />
                                    <span th:text="${item.product.name}"></span>
                                </div>
                            </td>
                            <td th:text="${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 0, 'POINT') + ' ₫'}">
                            </td>
                            <td th:text="${item.quantity}"></td>
                            <td
                                th:text="${#numbers.formatDecimal(item.product.price * item.quantity, 0, 'COMMA', 0, 'POINT') + ' ₫'}">
                            </td>
                            <td>
                                <form th:action="@{/cart/remove/{id}(id=${item.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-danger btn-sm">Xóa</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="3" style="text-align:right; font-weight:700;">Tổng cộng:</td>
                            <td colspan="2" style="font-weight:700; color:var(--primary);"
                                th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <div class="cart-actions">
                <form th:action="@{/cart/clear}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-secondary">🗑️ Xóa giỏ hàng</button>
                </form>
            </div>

            <!-- Checkout Form -->
            <div class="checkout-card">
                <h3>📦 Thông tin giao hàng</h3>
                <form th:action="@{/orders/checkout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="form-group">
                        <label for="shippingAddress">📍 Địa chỉ giao hàng</label>
                        <textarea id="shippingAddress" name="shippingAddress" class="form-control" rows="3"
                            placeholder="Nhập địa chỉ giao hàng..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">
                        ✅ Đặt hàng ngay (Tổng: <span
                            th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span>)
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
