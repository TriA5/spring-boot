<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main}">

<head>
    <title>Quản lý đơn hàng</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h2 class="page-title">📋 Quản lý đơn hàng</h2>
            <a th:href="@{/admin}" class="btn btn-secondary">← Quay lại</a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="table-wrapper">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Khách hàng</th>
                        <th>Địa chỉ</th>
                        <th>Tổng tiền</th>
                        <th>Ngày đặt</th>
                        <th>Trạng thái</th>
                        <th>Cập nhật</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.id}"></td>
                        <td th:text="${order.user.username}"></td>
                        <td th:text="${order.shippingAddress}"></td>
                        <td th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                        <td th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <span class="badge" th:classappend="${order.status.name() == 'PENDING' ? 'badge-warning' :
                                               order.status.name() == 'DELIVERED' ? 'badge-success' :
                                               order.status.name() == 'CANCELLED' ? 'badge-danger' : 'badge-info'}"
                                th:text="${order.status}"></span>
                        </td>
                        <td>
                            <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post"
                                class="inline-form">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <select name="status" class="form-control form-control-sm">
                                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                                        th:selected="${s == order.status}"></option>
                                </select>
                                <button type="submit" class="btn btn-primary btn-sm">Lưu</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
