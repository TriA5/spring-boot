<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main}">

<head>
    <title>Đăng ký</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>📝 Đăng ký tài khoản</h1>
                    <p>Tạo tài khoản để mua sắm ngay!</p>
                </div>

                <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

                <form th:action="@{/register}" method="post" th:object="${registerDTO}" class="auth-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="form-group">
                        <label for="username">👤 Tên đăng nhập</label>
                        <input type="text" id="username" th:field="*{username}" class="form-control"
                            placeholder="Nhập username..." />
                        <small class="field-error" th:if="${#fields.hasErrors('username')}"
                            th:errors="*{username}"></small>
                    </div>
                    <div class="form-group">
                        <label for="email">📧 Email</label>
                        <input type="email" id="email" th:field="*{email}" class="form-control"
                            placeholder="Nhập email..." />
                        <small class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
                    </div>
                    <div class="form-group">
                        <label for="password">🔒 Mật khẩu</label>
                        <input type="password" id="password" th:field="*{password}" class="form-control"
                            placeholder="Ít nhất 6 ký tự..." />
                        <small class="field-error" th:if="${#fields.hasErrors('password')}"
                            th:errors="*{password}"></small>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">🔒 Xác nhận mật khẩu</label>
                        <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control"
                            placeholder="Nhập lại mật khẩu..." />
                        <small class="field-error" th:if="${#fields.hasErrors('confirmPassword')}"
                            th:errors="*{confirmPassword}"></small>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Đăng ký</button>
                </form>
                <div class="auth-footer">
                    <p>Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a></p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
