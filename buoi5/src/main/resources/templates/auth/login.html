<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main}">

<head>
    <title>Đăng nhập</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>🔐 Đăng nhập</h1>
                    <p>Chào mừng trở lại!</p>
                </div>

                <div th:if="${param.error}" class="alert alert-error">
                    ❌ Tên đăng nhập hoặc mật khẩu không đúng!
                </div>
                <div th:if="${param.logout}" class="alert alert-success">
                    ✅ Đăng xuất thành công!
                </div>
                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                <form th:action="@{/login}" method="post" class="auth-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="form-group">
                        <label for="username">👤 Tên đăng nhập</label>
                        <input type="text" id="username" name="username" class="form-control"
                            placeholder="Nhập username..." required />
                    </div>
                    <div class="form-group">
                        <label for="password">🔒 Mật khẩu</label>
                        <input type="password" id="password" name="password" class="form-control"
                            placeholder="Nhập mật khẩu..." required />
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Đăng nhập</button>
                </form>
                <div class="auth-footer">
                    <p>Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a></p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
