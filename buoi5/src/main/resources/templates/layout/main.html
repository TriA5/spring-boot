<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title layout:title-pattern="$CONTENT_TITLE - Shop App">Shop App</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>

    <nav class="navbar">
        <div class="nav-brand">
            <a th:href="@{/}" class="nav-logo">🛍️ ShopApp</a>
        </div>
        <div class="nav-links">
            <a th:href="@{/}">Trang chủ</a>
            <a th:href="@{/products}">Sản phẩm</a>
            <a th:href="@{/categories}" sec:authorize="isAuthenticated()">Danh mục</a>
            <a th:href="@{/admin}" class="nav-admin" sec:authorize="hasAuthority('ROLE_ADMIN')">⚙️ Admin</a>
        </div>
        <form class="search-form" th:action="@{/products}" method="get">
            <input class="search-input" type="text" name="keyword" placeholder="Tìm sản phẩm..."
                th:value="${keyword}" />
            <button class="btn btn-search" type="submit">🔍</button>
        </form>
        <div class="nav-auth">
            <!-- Đã đăng nhập -->
            <div sec:authorize="isAuthenticated()" style="display:flex;align-items:center;gap:8px;">
                <a th:href="@{/cart}" class="nav-cart">🛒 Giỏ hàng</a>
                <a th:href="@{/orders/my-orders}">Đơn hàng</a>
                <span class="nav-user">👤
                    <sec:authentication property="name" />
                </span>
                <form th:action="@{/logout}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-logout">Đăng xuất</button>
                </form>
            </div>
            <!-- Chưa đăng nhập -->
            <div sec:authorize="!isAuthenticated()" style="display:flex;align-items:center;gap:8px;">
                <a th:href="@{/login}" class="btn btn-login">Đăng nhập</a>
                <a th:href="@{/register}" class="btn btn-register">Đăng ký</a>
            </div>
        </div>
    </nav>

    <div th:if="${cartSuccess}" class="flash-success" id="flash-msg">
        <span th:text="${cartSuccess}"></span>
    </div>
    <div th:if="${success}" class="flash-success" id="flash-msg2">
        <span th:text="${success}"></span>
    </div>

    <div class="container">
        <div layout:fragment="content"></div>
    </div>

    <footer>
        <p>© 2025 - ShopApp | Phát triển ứng dụng với Spring Boot</p>
    </footer>

    <script>
        setTimeout(() => {
            ['flash-msg', 'flash-msg2'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.display = 'none';
            });
        }, 3000);
    </script>

</body>

</html>
