<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main}">

<head>
    <title>Create Product</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="form-card">
            <h2>Tạo Sản Phẩm Mới</h2>
            <form th:action="@{/products/create}" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="name">Tên sản phẩm</label>
                    <input id="name" type="text" name="name" class="form-control" placeholder="Nhập tên sản phẩm"
                        required />
                </div>
                <div class="form-group">
                    <label for="price">Giá</label>
                    <input id="price" type="number" name="price" class="form-control" placeholder="Nhập giá" min="0"
                        step="0.01" required />
                </div>
                <div class="form-group">
                    <label for="categoryId">Danh mục</label>
                    <select id="categoryId" name="categoryId" class="form-control" required>
                        <option value="">-- Chọn danh mục --</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Category
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="imageFile">Ảnh sản phẩm</label>
                    <input id="imageFile" type="file" name="imageFile" class="form-control" accept="image/*" />
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Lưu</button>
                    <a th:href="@{/products}" class="btn btn-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
