<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Đăng nhập - Shop App</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f5f5f5; }
        .login-box {
            background: #fff; padding: 40px; border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,.1); width: 360px;
        }
        .login-box h2 { text-align: center; margin-bottom: 24px; color: #333; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #555; }
        .form-group input {
            width: 100%; padding: 10px 14px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 14px; box-sizing: border-box;
        }
        .btn-login {
            width: 100%; padding: 12px; background: #4f46e5; color: #fff;
            border: none; border-radius: 8px; font-size: 15px; cursor: pointer; margin-top: 8px;
        }
        .btn-login:hover { background: #4338ca; }
        .alert-error { background: #fee2e2; color: #dc2626; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; }
        .alert-logout { background: #dcfce7; color: #16a34a; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>🔐 Đăng nhập</h2>

    <div th:if="${param.error}" class="alert-error">
        ❌ Sai tên đăng nhập hoặc mật khẩu!
    </div>
    <div th:if="${param.logout}" class="alert-logout">
        ✅ Đã đăng xuất thành công!
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">Tên đăng nhập</label>
            <input type="text" id="username" name="username" placeholder="Nhập username..." required/>
        </div>
        <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input type="password" id="password" name="password" placeholder="Nhập mật khẩu..." required/>
        </div>
        <button type="submit" class="btn-login">Đăng nhập</button>
    </form>
</div>
</body>
</html>
